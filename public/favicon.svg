<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="#081318"></rect>

  <g filter="url(#glow)">
    <rect x="14" y="14" width="16" height="16" rx="3" fill="#6ffcff"></rect>
    <rect x="32" y="14" width="16" height="16" rx="3" fill="#6ffcff"></rect>
    <rect x="32" y="32" width="16" height="16" rx="3" fill="#6ffcff"></rect>
    <rect x="14" y="32" width="16" height="16" rx="3" fill="#1b3a42" stroke="#6ffcff" stroke-width="2"></rect>
  </g>

  <defs>
    <filter id="glow" x="-20" y="-20" width="104" height="104" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>
</svg>